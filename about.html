<html lang="en">
<head>
    <meta charset="UTF-8">

<body>

    <!-- HEADER -->
    
<header>

    <div class="logo">
        <img src="images/logo.png" alt="paws and Whiskers logo">
    </div>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">☰</label>
  


    <nav id="nav-menu">
        <a href="adopt.html">About</a>
        <a href="index.html">Home</a>

    </nav>

<!-- MAIN -->

<main>

<section class="animals">
    <h1>Animals Available</h1>

    <div class="card-container">

        <div class="card">
            <div class="image-container">
                <img src="images/milo.jpg" alt="White fluffy cat named milo">
            </div>
            <h2>Milo</h2>
            <p>Friendly white Persian cat looking for a forever home.</p>
            <button>Adopt</button>
        </div>

        <div class="card">
            <div class="image-container">
<img src="images/buddy.jpg" alt="Small 
brown dog named buddy">
            </div>
        
            <h2>Buddy</h2>
            <p>Sweet and affectionate small mixed breed dog.</p>
            <button>Adopt</button>
        </div>

        <div class="card">
            <div class="image-container">
                <img src="images/luna.jpg" alt="Playful 
gray kitten named luna">
            </div>
           
            <h2>Luna</h2>
            <p>Playful gray kitten ready to be your companion.</p>
            <button>Adopt</button>
        </div>
     </div>
</section>

</main>

<footer>
    <p>Help Us Save More Pets. Donate Today!</p>
    <button>Donate</button>
</footer>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Contact - Paws & Whiskers</title>
</head>
<body>

    <header>
        <div class="logo">
      <img src="images/logo.png" alt="Paws & Whiskers logo">
    </div>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">☰</label>

    <nav id="nav-menu">
    <a href="adopt.html">Adopt</a>
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
    <a href="#">Volunteer</a>
    <a href="#" class="donate-btn">Donate</a>
</nav>

    </header>

    <main class="contact">

            <h1>Contact Us</h1>

            <div class="contact-container">

                <div class="contact-box contact-info">
                <h2>Get in Touch</h2>
        <p>Email: info@pawsandwhiskers.com</p>
        <p>Phone: 613-273-1923</p>
        <p>Location: 167 Paws Av.</p>
                </div>

        <form class=" contact-box contact-form">

        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>

      </form>




            </div>

    </main>
    

    <footer>
    <p>Help Us Save More Pets. Donate Today!</p>
    <button>Donate</button>


</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- To link this html file to the css file!! -->
    <link rel="stylesheet" href="css/styles.css">
    <title>Contact - Paws & Whiskers</title>
</head>
<body>

    <!-- Just like the about page this is the header that has the logo and nav menu inside! -->
    <header>

        <!-- the logo! -->
        <div class="logo">
            <img src="images/logo.png" alt="Paws & Whiskers logo">
        </div>

    <!-- for the drop down menu -->
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">☰</label>

        <!-- nav info that allows you to click between the html pages! -->
        <nav id="nav-menu">
            <a href="adopt.html">Adopt</a>
            <a href="index.html">Home</a>
            <a href="contact.html">Contact</a>
            <a href="#">Volunteer</a>
            <a href="#" class="donate-btn">Donate</a>
        </nav>

    </header>

    <!-- the main class which is just the main content area for the contact page -->
    <main class="contact">

            <h1>Contact Us</h1>

            <div class="contact-container">
                <!-- this container has information and the form which I put side by side using flexbox! -->

                <div class="contact-box contact-info">
                    <!-- this box as all the contact information users would need to know! -->
                    <h2>Get in Touch</h2>
                    <p>Email: info@pawsandwhiskers.com</p>
                    <p>Phone: 613-273-1923</p>
                    <p>Location: 167 Paws Av.</p>
                </div>

        <!-- this is a form for users to fill out! it would allow them to send a message -->
        <form class=" contact-box contact-form">

        <!-- the label is connected to the input for accessibility! -->
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
        <!-- this makes it so users are required to fill this box out -->

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
        <!-- this is the submit button! -->

        </form>

            </div>

    </main>
    
    <!-- the footer with the same call to action! -->
    <footer>
        <p>Help Us Save More Pets. Donate Today!</p>
    <button>Donate</button>


</body>
</html>
